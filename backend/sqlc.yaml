version: "2"
sql:
  - schema: "migrations/"
    queries: "db/queries/"
    engine: "postgresql"
    gen:
      go:
        package: "postgres"
        out: "internal/adapters/postgres"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        overrides:
          - column: "users.locale"
            go_type: "github.com/rodrigo-militao/forge/internal/core/domain.Locale"
          - column: "users.theme_preference"
            go_type: "github.com/rodrigo-militao/forge/internal/core/domain.ThemePreference"
          - column: "generated_content.status"
            go_type: "github.com/rodrigo-militao/forge/internal/core/domain.ContentStatus"
          - column: "generated_content.product"
            go_type: "github.com/rodrigo-militao/forge/internal/core/domain.ContentProduct"
          - column: "jobs.status"
            go_type: "github.com/rodrigo-militao/forge/internal/core/domain.JobStatus"
